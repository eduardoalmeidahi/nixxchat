name: Deploy NixxChat VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-nixxchat-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy para VPS CloudPanel
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do GitHub
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Enviar arquivos para VPS
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude "storage" \
            --exclude "uploads" \
            --exclude "backend/public" \
            --exclude "node_modules" \
            --exclude "vendor" \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/"

      - name: Rodar comandos pós-deploy
        run: |
          PORT="${{ secrets.VPS_PORT }}"
          PORT="${PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            cd '${{ secrets.VPS_PATH }}'

            if [ -f composer.json ]; then
              composer install --no-dev --prefer-dist --optimize-autoloader
            fi

            if [ -d backend ]; then
              cd backend
              npm install
              npm run build
              cd ..
            fi

            if [ -d frontend ]; then
              cd frontend
              npm install
              npm run build
              cd ..
            fi

            if [ -f artisan ]; then
              php artisan migrate --force
              php artisan config:cache
              php artisan route:cache
              php artisan view:cache
            fi
            sudo -n /usr/local/bin/restart-nixchat
            echo 'Deploy finalizado com sucesso.'
          "
